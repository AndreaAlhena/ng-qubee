name: Deploy docs site to GitHub Pages

on:
  # Production deploy on every push to master
  push:
    branches: [master]
    # Skip if the push only touched files outside docs-site / library source
    paths:
      - 'docs-site/**'
      - 'src/**'
      - 'tsconfig*.json'
      - '.github/workflows/docs.yml'

  # Allow re-running manually from the Actions tab
  workflow_dispatch:

# GitHub Pages requires these permissions on the workflow that uploads
permissions:
  contents: read
  pages: write
  id-token: write

# Don't queue concurrent deploys; cancel any in-progress run when a newer
# push lands so we never deploy a stale build
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json

      - name: Install root dependencies
        # Needed for TypeDoc to resolve library imports during the docs build
        run: npm ci

      - name: Install docs-site dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build Docusaurus site
        working-directory: docs-site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
